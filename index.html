<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিসমিল্লাহ ট্রাস্টেড এজেন্সি</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}
header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}
.container{
max-width:800px;
margin:auto;
padding:20px;
}
.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}
button{
background:#16a34a;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}
input,select{
width:100%;
padding:10px;
margin:8px 0;
}
</style>
</head>
<body>

<header>
<h1>বিসমিল্লাহ ট্রাস্টেড এজেন্সি</h1>
<p>ফেসবুক,পেজ, ইনস্টাগ্রাম, টিকটক ও ইউটিউব সার্ভিস</p>
</header>

<div class="container">

<div class="card">
<h2>বিকাশ নগদ সেন্ড মানি করবেন অবশ্যই</h2>
<p><b>বিকাশ:</b> 01352963018</p>
<p><b>নগদ:</b> 01352963018</p>
</div>

<div class="card">
<h2>অর্ডার করুন</h2>

<input type="text" placeholder="আপনার নাম">

<select>
<option>ফেসবুক ফলোয়ার</option>
<option>ইনস্টাগ্রাম ফলোয়ার</option>
<option>টিকটক ফলোয়ার</option>
<option>ইউটিউব সাবস্ক্রাইবার</option>
</select>

<input type="text" placeholder="প্রোফাইল/পেজ লিংক">

<input type="text" placeholder="ট্রানজেকশন আইডি">

<button>অর্ডার সাবমিট</button>

</div>

<div class="card">
<h2>অর্ডার স্ট্যাটাস</h2>
<p>ডেমো: Pending</p>
</div>

</div>

</body>
</html>
